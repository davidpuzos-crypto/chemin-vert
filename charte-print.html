<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Charte — Chemin Vert</title>
  <style>
    @page { size: A4; margin: 20mm 18mm; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body {
      font-family: "Inter", "Helvetica Neue", "Segoe UI", system-ui, sans-serif;
      color: #17251d; line-height: 1.6; background: #fff;
    }
    body[dir="rtl"] { font-family: "Tajawal", "Segoe UI", system-ui, sans-serif; }
    .serif { font-family: "Fraunces", Georgia, "Times New Roman", serif; }
    .ui { font-family: "Jost", "Century Gothic", "Futura", "Segoe UI", sans-serif; }

    .doc { max-width: 720px; margin: 0 auto; }

    /* En-tête */
    .head { text-align: center; margin-bottom: 30px; }
    .brand { display: inline-flex; align-items: center; gap: 11px; margin-bottom: 26px; }
    .brand .dot { width: 26px; height: 26px; border-radius: 50%;
      background: linear-gradient(135deg, #27a35c, #0f4f30); }
    .brand .name { font-size: 17px; color: #0c3823; font-weight: 500;
      letter-spacing: .28em; text-transform: uppercase; }
    body[dir="rtl"] .brand .name { letter-spacing: .12em; }
    .kicker { text-transform: uppercase; letter-spacing: .28em; font-size: 10.5px;
      color: #1c8a4b; font-weight: 600; }
    h1 { font-size: 38px; color: #0c3823; font-weight: 500; margin-top: 8px; letter-spacing: -.5px; }
    .rule { width: 54px; height: 2px; background: #27a35c; margin: 20px auto 0; border-radius: 2px; }

    /* Préambule */
    .preamble { margin: 6px 0 34px; }
    .lead { font-size: 17px; line-height: 1.5; color: #0c3823; font-style: italic;
      text-align: center; max-width: 60ch; margin: 0 auto 16px; }
    .p { font-size: 13px; color: #45564c; text-align: center; max-width: 62ch; margin: 0 auto; }

    /* Titre de section */
    .section-title { text-align: center; margin-bottom: 18px; }
    .section-title .st-kicker { text-transform: uppercase; letter-spacing: .24em; font-size: 10px;
      color: #1c8a4b; font-weight: 600; }
    .section-title h2 { font-size: 21px; color: #0f4f30; font-weight: 500; margin-top: 4px; }

    /* Tableau des valeurs */
    table.values { width: 100%; border-collapse: collapse; }
    table.values td { width: 50%; vertical-align: middle; padding: 0; }
    .cell { display: flex; align-items: center; gap: 14px; padding: 11px 14px; }
    .cell .n { font-family: "Fraunces", Georgia, serif; font-size: 17px; color: #4cbb7a;
      font-weight: 500; min-width: 26px; text-align: center; }
    .cell .t { font-family: "Fraunces", Georgia, serif; font-size: 16px; color: #0c3823; font-weight: 500; }
    table.values tr { border-bottom: 1px solid #e6f3ec; }
    table.values tr:last-child { border-bottom: 0; }
    table.values td:first-child { border-right: 1px solid #e6f3ec; }
    body[dir="rtl"] table.values td:first-child { border-right: 0; border-left: 1px solid #e6f3ec; }
    table.values tr:nth-child(odd) .cell { background: #f4faf6; }

    /* Pied de page */
    .foot { margin-top: 34px; text-align: center; font-size: 10.5px; color: #6a7d71;
      border-top: 1px solid #e6f3ec; padding-top: 16px; }
    .foot .fbrand { font-family: "Jost","Century Gothic",sans-serif; text-transform: uppercase;
      letter-spacing: .2em; color: #0f4f30; font-weight: 500; }
  </style>
</head>
<body>
  <div class="doc">
    <header class="head">
      <div class="brand"><span class="dot"></span><span class="name">Chemin Vert</span></div>
      <div class="kicker" id="kicker">Préambule</div>
      <h1 class="serif" id="title">Notre charte</h1>
      <div class="rule"></div>
    </header>

    <section class="preamble">
      <p class="lead serif" id="p1"></p>
      <p class="p" id="p2"></p>
    </section>

    <div class="section-title">
      <h2 id="valuesTitle" class="serif">Les quinze valeurs</h2>
    </div>
    <table class="values"><tbody id="values"></tbody></table>

    <div class="foot">
      <span class="fbrand">Chemin Vert</span>
      <span id="foot"></span>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const lang = I18N.languages[params.get("lang")] ? params.get("lang") : "fr";
      const meta = I18N.languages[lang];
      const t = I18N.t[lang];
      document.documentElement.setAttribute("lang", lang);
      document.body.setAttribute("dir", meta.dir);

      const set = (id, val) => { const e = document.getElementById(id); if (e) e.textContent = val; };
      set("kicker", t["charter.preamble_tag"]);
      set("title", t["charter.preamble_title"]);
      set("p1", t["charter.preamble_p1"]);
      set("p2", t["charter.preamble_p2"]);
      set("valuesTitle", t["charter.values_title"]);

      // Tableau : deux colonnes, une valeur par cellule
      const values = I18N.values[lang];
      const body = document.getElementById("values");
      const rows = Math.ceil(values.length / 2);
      const cellHtml = (i) => {
        if (i >= values.length) return '<td></td>';
        return '<td><div class="cell"><span class="n">' + String(i + 1).padStart(2, "0") +
               '</span><span class="t">' + values[i] + '</span></div></td>';
      };
      for (let r = 0; r < rows; r++) {
        const tr = document.createElement("tr");
        tr.innerHTML = cellHtml(r) + cellHtml(r + rows);
        body.appendChild(tr);
      }

      set("foot", " — " + t["footer.tagline"]);
      document.title = "Charte — Chemin Vert (" + lang + ")";
      document.body.dataset.ready = "1";
    })();
  </script>
</body>
</html>
