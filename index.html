<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chemin Vert</title>
  <meta name="description" content="Chemin Vert — un mouvement humaniste. Choisissez votre langue." />
  <meta name="theme-color" content="#14713c" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%2314713c'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&family=Jost:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="welcome">
  <div class="bg-aurora" aria-hidden="true">
    <span class="blob blob-1"></span><span class="blob blob-2"></span><span class="blob blob-3"></span>
  </div>

  <main class="welcome__stage">
    <div class="wordmark welcome__brand" aria-label="Chemin Vert">
      <span class="wm-line wm-line--top"><i>C</i><i>H</i><i>E</i><i>M</i><i>I</i><i>N</i></span>
      <span class="wm-line wm-line--bottom"><i>V</i><i>E</i><i>R</i><i>T</i></span>
    </div>

    <p class="welcome__choose" id="wChoose">Choisissez votre langue</p>

    <div class="flower" id="flower">
      <button class="bloom" id="bloom" aria-label="Entrer">
        <span class="bloom__flag" id="bloomFlag">🇫🇷</span>
        <span class="bloom__lang" id="bloomLang">Français</span>
        <span class="bloom__enter" id="bloomEnter">Entrer</span>
      </button>
    </div>

    <button class="welcome__skip" id="wSkip" type="button">Passer</button>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/welcome.js"></script>
</body>
</html>
