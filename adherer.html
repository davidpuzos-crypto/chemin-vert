<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="meta.title">Chemin Vert — Adhérer</title>
  <meta name="description" data-i18n="meta.desc" content="Adhérez au mouvement Chemin Vert : signez la charte en un clic et faites grandir le compteur." />
  <meta name="theme-color" content="#14713c" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%2314713c'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&family=Jost:wght@300;400;500&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="join">
  <div class="bg-aurora" aria-hidden="true">
    <span class="blob blob-1"></span><span class="blob blob-2"></span><span class="blob blob-3"></span>
    <div class="bg-leaves" id="leaves"></div>
  </div>

  <div id="site-header"></div>

  <main>
    <!-- Compteur géant -->
    <section class="join-hero">
      <div class="container reveal">
        <p class="join-hero__pre" data-i18n="join.hero_pre">Nous sommes déjà</p>
        <div class="join-hero__num"><span class="js-counter">—</span></div>
        <p class="join-hero__post" data-i18n="join.hero_post">à avoir signé la charte</p>
        <div class="milestone milestone--wide" data-milestone>
          <div class="milestone__head">
            <span data-i18n="milestone.next">Prochain objectif</span>
            <span><span class="milestone__cur js-counter">—</span> / <span class="milestone__goal">—</span></span>
          </div>
          <div class="milestone__bar"><span class="milestone__fill"></span></div>
        </div>
      </div>
    </section>

    <!-- Formulaire -->
    <section class="section section--tight" id="sign">
      <div class="container sign__card reveal">
        <p class="tag" data-i18n="sign.tag">Rejoindre</p>
        <h2 class="section__title" data-i18n="join.title">Ajoutez votre voix</h2>
        <p class="section__intro" data-i18n="join.text"></p>
        <form class="sign__form" id="signForm" novalidate>
          <input type="email" id="signEmail" class="sign__input" required autocomplete="email"
                 data-i18n-attr="placeholder:sign.placeholder" placeholder="votre@email.com" />
          <button type="submit" class="btn btn--primary btn--lg" id="signBtn">
            <span data-i18n="sign.button">Je signe</span>
          </button>
        </form>
        <p class="sign__msg" id="signMsg" role="status" aria-live="polite"></p>
        <p class="sign__privacy" data-i18n="sign.privacy"></p>
      </div>
    </section>

    <!-- Pourquoi adhérer -->
    <section class="section section--tight">
      <div class="container">
        <h2 class="section__title section__title--center reveal" data-i18n="join.why_t">Pourquoi adhérer ?</h2>
        <div class="why">
          <article class="why__item reveal">
            <span class="why__num">01</span>
            <h3 data-i18n="join.why1_t">Gratuit et simple</h3>
            <p data-i18n="join.why1_d"></p>
          </article>
          <article class="why__item reveal">
            <span class="why__num">02</span>
            <h3 data-i18n="join.why2_t">Vous comptez</h3>
            <p data-i18n="join.why2_d"></p>
          </article>
          <article class="why__item reveal">
            <span class="why__num">03</span>
            <h3 data-i18n="join.why3_t">Vous restez informé</h3>
            <p data-i18n="join.why3_d"></p>
          </article>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/signatures.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
