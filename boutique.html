<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="meta.title">Chemin Vert — Boutique</title>
  <meta name="description" data-i18n="meta.desc" content="La boutique Chemin Vert : autocollants, badges et objets pour afficher votre engagement." />
  <meta name="theme-color" content="#14713c" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%2314713c'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&family=Jost:wght@300;400;500&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="shop">
  <div class="bg-aurora" aria-hidden="true">
    <span class="blob blob-1"></span><span class="blob blob-2"></span><span class="blob blob-3"></span>
    <div class="bg-leaves" id="leaves"></div>
  </div>

  <div id="site-header"></div>

  <main>
    <header class="page-head">
      <div class="container">
        <p class="tag reveal" data-i18n="shop.tag">Boutique</p>
        <h1 class="page-head__title reveal" data-i18n="shop.title">Affichez votre engagement</h1>
        <p class="section__intro section__intro--center reveal" data-i18n="shop.text"></p>
      </div>
    </header>

    <section class="section section--tight section--shop">
      <div class="container">
        <div class="shop__grid">
          <article class="product reveal">
            <div class="product__visual product__visual--1"><span class="product__price">3&nbsp;€</span></div>
            <div class="product__body">
              <h3 data-i18n="shop.product1">Autocollants</h3>
              <p data-i18n="shop.product1_desc"></p>
              <button class="btn btn--primary product__add" data-product="sticker">
                <span data-i18n="shop.add">Ajouter au panier</span>
              </button>
            </div>
          </article>
          <article class="product reveal">
            <div class="product__visual product__visual--2"><span class="product__price">5&nbsp;€</span></div>
            <div class="product__body">
              <h3 data-i18n="shop.product2">Badges</h3>
              <p data-i18n="shop.product2_desc"></p>
              <button class="btn btn--primary product__add" data-product="badge">
                <span data-i18n="shop.add">Ajouter au panier</span>
              </button>
            </div>
          </article>
          <article class="product reveal">
            <div class="product__visual product__visual--3"><span class="product__price">15&nbsp;€</span></div>
            <div class="product__body">
              <h3 data-i18n="shop.product3">Tote bag</h3>
              <p data-i18n="shop.product3_desc"></p>
              <button class="btn btn--primary product__add" data-product="tote">
                <span data-i18n="shop.add">Ajouter au panier</span>
              </button>
            </div>
          </article>
        </div>
      </div>
    </section>

    <!-- Bouton panier flottant -->
    <button class="cart-fab" id="cartFab" aria-label="Panier">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
      <span class="cart-fab__badge" id="cartBadge">0</span>
    </button>

    <!-- Tiroir panier -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <aside class="cart" id="cart" aria-hidden="true">
      <div class="cart__head">
        <h2 data-i18n="shop.cart">Panier</h2>
        <button class="cart__close" id="cartClose" aria-label="Fermer">&times;</button>
      </div>
      <div class="cart__items" id="cartItems"></div>
      <div class="cart__foot">
        <div class="cart__total">
          <span data-i18n="shop.total">Total</span>
          <strong id="cartTotal">0&nbsp;€</strong>
        </div>
        <button class="btn btn--primary btn--lg cart__checkout" id="cartCheckout" data-i18n="shop.checkout">Commander</button>
        <p class="cart__msg" id="cartMsg" role="status" aria-live="polite"></p>
      </div>
    </aside>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/signatures.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
